name: Update Filter Lists

on:
  schedule:
    - cron: "0 3 * * 1"
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_ENV: production

jobs:
  cgps:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"

      - name: Install npm dependencies
        run: npm ci

      - name: Download lists, create rules and lists
        run: npm start
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_LIST_ITEM_LIMIT: ${{ secrets.CLOUDFLARE_LIST_ITEM_LIMIT }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          BLOCK_PAGE_ENABLED: ${{ vars.BLOCK_PAGE_ENABLED }}
          ALLOWLIST_URLS: ${{ vars.ALLOWLIST_URLS }}
          CORE_BLOCKLIST_URLS: ${{ vars.CORE_BLOCKLIST_URLS }}
          CORE_ALLOWLIST_URLS: ${{ vars.CORE_ALLOWLIST_URLS }}
          CORE_LOCATION_IDS: ${{ vars.CORE_LOCATION_IDS }}
          LITE_BLOCKLIST_URLS: ${{ vars.LITE_BLOCKLIST_URLS }}
          LITE_ALLOWLIST_URLS: ${{ vars.LITE_ALLOWLIST_URLS }}
          LITE_LOCATION_IDS: ${{ vars.LITE_LOCATION_IDS }}
          PRO_BLOCKLIST_URLS: ${{ vars.PRO_BLOCKLIST_URLS }}
          PRO_ALLOWLIST_URLS: ${{ vars.PRO_ALLOWLIST_URLS }}
          PRO_LOCATION_IDS: ${{ vars.PRO_LOCATION_IDS }}

      - name: Send ping request
        if: env.PING_URL != ''
        run: |
          curl "${{ env.PING_URL }}"
        env:
          PING_URL: ${{ secrets.PING_URL }}

  keepalive:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - uses: liskin/gh-workflow-keepalive@v1
